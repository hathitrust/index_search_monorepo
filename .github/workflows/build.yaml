name: Build

on:
    workflow_dispatch:
        inputs:
            img_tag:
                description: Docker Image Tag
            ref:
                description: Revision or Branch to build
                default: main
            push_latest:
                description: Set True if the build is for the latest version
                type: boolean
                required: false
                default: false
            platforms:
                description: Platforms to build for
                type: choice
                default: linux/amd64,linux/arm64
                options:
                - linux/amd64,linux/arm64
                - linux/amd64
                - linux/arm64
            rebuild:
                description: Rebuild this image?
                type: boolean
                default: false
            services: # Does it make sense to have services manually build each service? We can use these values when we set up the target in the Dockerfile
                description: Services to build
                required: true
                type: choice
                default: ht_indexer,solr_query
                options:
                - ht_indexer,solr_query
                - ht_indexer
                - solr_query

jobs:
    build-image:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Build HT Indexer
              uses: hathitrust/github_actions/build@ETT-376
              with:
                image: ghcr.io/hathitrust/indexer
                dockerfile: Dockerfile
                target: "ht_indexer"
                img_tag: ${{ inputs.img_tag }}
                tag: ${{ inputs.ref }}
                push_latest: ${{ inputs.push_latest}}
                registry_token: ${{ github.token }}
                rebuild: ${{ inputs.rebuild }}
            - name: Build Solr Query
              uses: hathitrust/github_actions/build@ETT-376
              with:
                image: ghcr.io/hathitrust/solr_query
                dockerfile: Dockerfile
                target: "solr_query"
                img_tag: ${{ inputs.img_tag }}
                tag: ${{ inputs.ref }}
                push_latest: ${{ inputs.push_latest}}
                registry_token: ${{ github.token }}
                rebuild: ${{ inputs.rebuild }}
